[platformio]
; default = which env **build / upload** use — monitor alone does not re-flash the chip
default_envs = embedded_rising_falling

; esp32-s3-eye: esp32s3camlcd + flash/psram/usb (platform-espressif32 #1535)
; firmware lives in test_programs/image_capture/; src/main.cpp includes it so default "src" builds work
; for camera: set default_envs = image_capture or run upload for env image_capture

[env:image_capture]
platform = espressif32
board = esp32s3camlcd
framework = arduino
monitor_speed = 115200
lib_deps =
  espressif/esp32-camera

board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.boot = qio

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1

; program 2 on-device: TFLite Micro + embedded int8 model (see test_programs/embedded_rising_falling/README.md)
[env:embedded_rising_falling]
platform = espressif32
board = esp32s3camlcd
framework = arduino
monitor_speed = 115200
src_dir = test_programs/embedded_rising_falling
extra_scripts =
  pre:scripts/apply_tflm_compat_patch.py
lib_deps =
  https://github.com/trylaarsdam/pio-tflite-lib.git

board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_opi
board_build.boot = qio

build_flags =
  -DARDUINO_USB_CDC_ON_BOOT=1
  -std=gnu++17
  ; tflite micro: skip full-tflite-only includes (e.g. tensorflow/lite/array.h) in shared kernel_util.cc
  -DTF_LITE_STATIC_MEMORY
